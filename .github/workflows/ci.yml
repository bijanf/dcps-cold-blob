name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: dcps/pyproject.toml

      - name: System dependencies (cartopy / netCDF4)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgeos-dev libproj-dev proj-data proj-bin \
            libhdf5-dev libnetcdf-dev

      - name: Install dcps package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e "./dcps[dev]"

      - name: Run dcps test suite
        run: pytest dcps/tests/ -v --tb=short

      - name: Run quiescence_toolkit test suite
        run: pytest quiescence_toolkit/tests/ -v --tb=short

  lint:
    name: ruff (syntax + undefined names)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.6"

      # Restricted to fatal-class checks (syntax errors, invalid literal
      # comparisons, undefined names in __all__) so the gate stays
      # informative without forcing research-code style cleanups.
      - name: Lint
        run: |
          ruff check dcps/ quiescence_toolkit/ \
            --select=E9,F63,F7,F82 \
            --output-format=github
